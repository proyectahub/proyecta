<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Proyecta — Apoyo mutuo y comunitario para la ciencia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    <!--
      Cache-buster: detecta cambio de bundle y fuerza hard-reload en browser móvil.
      Se ejecuta ANTES de React para evitar que la app vieja arranque.
    -->
    <script>
      (function () {
        try {
          var BUILD_KEY = "nova_build_id";
          var CURRENT = "%%NOVA_BUILD_ID%%";
          var stored = localStorage.getItem(BUILD_KEY);
          if (stored && stored !== CURRENT) {
            // Build nuevo detectado — limpia caché y recarga desde red
            localStorage.setItem(BUILD_KEY, CURRENT);
            // Fuerza recarga ignorando la caché del browser
            window.location.reload(true);
            return;
          }
          if (!stored) {
            localStorage.setItem(BUILD_KEY, CURRENT);
          }
        } catch (e) {
          // localStorage no disponible (modo privado muy restrictivo) — continuar
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
