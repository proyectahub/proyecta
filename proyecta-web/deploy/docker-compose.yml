# Despliegue del proxy de minería con HTTPS/WSS automático (Caddy + Let's Encrypt).
#
# Requisitos:
#   1. Un VPS con Docker y Docker Compose
#   2. Un dominio apuntando (registro A) a la IP del VPS
#   3. Puertos 80 y 443 abiertos en el firewall
#
# Uso:
#   export PROXY_DOMAIN=mineria.tudominio.com
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# Luego, en el frontend (.env):
#   VITE_MINING_WS_URL=wss://mineria.tudominio.com/ws/mining

services:
  proxy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3001
    expose:
      - "3001"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PROXY_DOMAIN=${PROXY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
